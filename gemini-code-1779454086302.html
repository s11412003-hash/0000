<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 狼人殺互動模擬器 Web版</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --primary: #8a2be2;
            --wolf: #e63946;
            --good: #457b9d;
            --text: #e0e0e6;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h1, h2, h3 { text-align: center; color: #fff; }
        .highlight { color: var(--primary); }

        /* 玩家列表樣式 */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .player-card {
            background: #2a2a35;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: all 0.3s;
        }

        .player-card.dead {
            opacity: 0.4;
            background: #15151c;
            border-color: #222;
            text-decoration: line-through;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 5px;
        }
        .badge.wolf { background: var(--wolf); }
        .badge.good { background: var(--good); }

        /* 遊戲日誌與操作區 */
        .log-box {
            background: #0d0d11;
            border-left: 4px solid var(--primary);
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .action-zone {
            background: #252530;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #444;
        }

        /* 按鈕與表單 */
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: background 0.2s;
        }
        button:hover { background: #9d4edd; }
        button:disabled { background: #444; cursor: not-allowed; }

        select, input[type="text"] {
            background: #121214;
            color: #fff;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 4px;
            margin: 5px;
        }

        .secret-view {
            background: #9d4edd22;
            border: 1px dashed var(--primary);
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎭 狼人殺互動模擬器 Web版</h1>
    <div id="game-info" style="text-align: center; font-size: 18px; margin-bottom: 10px;">準備開局...</div>

    <h3>👥 玩家狀態面板 (👁️ 上帝視角)</h3>
    <div class="player-grid" id="player-grid"></div>

    <h3>📜 遊戲日誌</h3>
    <div class="log-box" id="log-box"></div>

    <div class="action-zone" id="action-zone">
        <div id="phase-reveal">
            <h2>🔮 步驟 1: 請玩家依序確認身份</h2>
            <div style="text-align:center;">
                <label>選擇你的玩家編號：</label>
                <select id="reveal-select"></select>
                <button onclick="revealRole()">查看角色</button>
            </div>
            <div id="reveal-card-area" class="secret-view hidden">
                <h3 id="reveal-text"></h3>
                <button onclick="clearReveal()">我已記住，清除畫面</button>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <button id="btn-start-game" disabled onclick="startFirstNight()" style="background:#2a9d8f;">✅ 所有人已確認，正式開始遊戲</button>
            </div>
        </div>

        <div id="phase-gameplay" class="hidden">
            <h2 id="action-title">夜幕降臨...</h2>
            <div id="action-inputs"></div>
            <button id="btn-submit-action" onclick="processAction()">確認送出</button>
        </div>
    </div>
</div>

<script>
// --- 核心遊戲資料結構 ---
class Player {
    constructor(id, role, roleCn, side) {
        this.id = id;
        this.name = `${id}號玩家`;
        this.role = role;
        this.roleCn = roleCn;
        this.side = side;
        this.isAlive = true;
    }
}

let players = [];
let dayCount = 1;
let witchHeal = true;
let witchPoison = true;
let mediatorUsed = false;
let mediatorTargets = []; // 禁票名單
let viewedPlayers = new Set();

// 流程控制狀態機變數
let currentSubPhase = ""; 
let nightData = { killTarget: null, poisonTarget: null, saved: false };
let voteBox = {};

const roleMap = {
    "狼人": { role: "Werewolf", side: "狼人" },
    "平民": { role: "Villager", side: "好人" },
    "預言家": { role: "Seer", side: "好人" },
    "女巫": { role: "Witch", side: "好人" },
    "調停者": { role: "Mediator", side: "好人" },
    "叛徒": { role: "Traitor", side: "好人" }
};

// --- 初始化遊戲 ---
function initGame() {
    let pool = ["狼人", "狼人", "狼人", "平民", "平民", "平民", "預言家", "女巫", "調停者", "叛徒"];
    // 洗牌
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }

    players = [];
    const selectEl = document.getElementById("reveal-select");
    selectEl.innerHTML = "";

    for (let i = 0; i < 10; i++) {
        let rCn = pool[i];
        players.push(new Player(i + 1, roleMap[rCn].role, rCn, roleMap[rCn].side));
        
        let opt = document.createElement("option");
        opt.value = i + 1;
        opt.textContent = `${i + 1}號玩家`;
        selectEl.appendChild(opt);
    }

    log("🎲 遊戲初始化完成！請下方玩家依序點擊查看身份。");
    renderPlayers();
}

function renderPlayers() {
    const grid = document.getElementById("player-grid");
    grid.innerHTML = "";
    players.forEach(p => {
        const card = document.createElement("div");
        card.className = `player-card ${p.isAlive ? '' : 'dead'}`;
        card.innerHTML = `
            <strong>${p.name}</strong><br>
            <span class="badge ${p.side==='狼人'?'wolf':'good'}">${p.roleCn}</span><br>
            <small>${p.isAlive ? '🟢 存活' : '💀 死亡'}</small>
        `;
        grid.appendChild(card);
    });
}

function log(msg) {
    const box = document.getElementById("log-box");
    box.innerHTML += `<div>${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

// --- 身份查閱階段 ---
function revealRole() {
    const id = parseInt(document.getElementById("reveal-select").value);
    const p = players[id - 1];
    
    const area = document.getElementById("reveal-card-area");
    const txt = document.getElementById("reveal-text");
    
    txt.innerHTML = `🤫 你是 <span style="color:var(--primary)">${p.roleCn}</span> 陣營：【${p.side}】`;
    area.classList.remove("hidden");
    
    viewedPlayers.add(id);
    
    if(viewedPlayers.size === 10) {
        document.getElementById("btn-start-game").disabled = false;
    }
}

function clearReveal() {
    document.getElementById("reveal-card-area").classList.add("hidden");
}

// --- 進入核心局勢 ---
function startFirstNight() {
    document.getElementById("phase-reveal").classList.add("hidden");
    document.getElementById("phase-gameplay").classList.remove("hidden");
    startNight();
}

function checkVictory() {
    let alive = players.filter(p => p.isAlive);
    let wolves = alive.filter(p => p.side === "狼人");
    let gods = alive.filter(p => p.role === "Witch" || p.role === "Seer" || p.role === "Mediator" || (p.role === "Traitor" && p.side === "好人"));

    if (gods.length === 0) {
        alert("🐺 【遊戲結束】狼人勝利！神職已全數滅絕。");
        log("💥 <b>狼人獲勝！神職全滅。</b>");
        document.getElementById("phase-gameplay").innerHTML = "<h3>🎮 遊戲結束 - 狼人獲勝</h3>";
        return true;
    }
    if (wolves.length === 0) {
        let traitorWolf = alive.find(p => p.role === "Traitor" && p.side === "狼人");
        if (traitorWolf) {
            alert("🐺 【遊戲結束】狼人勝利！原生狼人已死，但叛徒已接管狼群。");
            log("💥 <b>狼人獲勝！叛徒繼承狼隊。</b>");
            document.getElementById("phase-gameplay").innerHTML = "<h3>🎮 遊戲結束 - 狼人獲勝</h3>";
            return true;
        } else {
            alert("🎉 【遊戲結束】好人勝利！所有狼人已被消滅。");
            log("🎉 <b>好人獲勝！正義彰顯。</b>");
            document.getElementById("phase-gameplay").innerHTML = "<h3>🎮 遊戲結束 - 好人獲勝</h3>";
            return true;
        }
    }
    return false;
}

// --- 夜晚階段邏輯控制器 ---
function startNight() {
    document.getElementById("game-info").textContent = `🌙 第 ${dayCount} 晚`;
    log(`<br><b>--- 🌙 第 ${dayCount} 晚 開始 ---</b>`);
    
    // 重設夜間暫存資料
    nightData = { killTarget: null, poisonTarget: null, saved: false };
    
    // 1. 狼人夜間頻道模擬
    let wolves = players.filter(p => p.isAlive && p.side === "狼人").map(p => p.name);
    log(`🐺 狼人暗夜頻道成員: ${wolves.join(", ")}`);
    
    currentSubPhase = "WOLF_KILL";
    setupActionUI("🐺 狼人請商議擊殺目標 (不可棄權)", false);
}

function setupActionUI(title, canSkip) {
    document.getElementById("action-title").textContent = title;
    const container = document.getElementById("action-inputs");
    container.innerHTML = "";

    let select = document.createElement("select");
    select.id = "action-target-select";

    if(canSkip) {
        let optBox = document.createElement("option");
        optBox.value = "0";
        optBox.textContent = "0 - 棄權 / 不發動";
        select.appendChild(optBox);
    }

    players.forEach(p => {
        if(p.isAlive) {
            let opt = document.createElement("option");
            opt.value = p.id;
            opt.textContent = `${p.id}號玩家 (${p.name})`;
            select.appendChild(opt);
        }
    });
    container.appendChild(select);
}

// 處理各夜間/白天步驟的送出
function processAction() {
    const targetId = parseInt(document.getElementById("action-target-select")?.value || "0");
    const target = players.find(p => p.id === targetId) || null;

    if (currentSubPhase === "WOLF_KILL") {
        nightData.killTarget = target;
        log(`🐾 狼人選擇了秘密目標。`);
        
        // 進入預言家
        let seer = players.find(p => p.isAlive && p.role === "Seer");
        if(seer) {
            currentSubPhase = "SEER_CHECK";
            setupActionUI("🔮 預言家請選擇要查驗的玩家", true);
        } else {
            goToWitchPhase();
        }
    } 
    else if (currentSubPhase === "SEER_CHECK") {
        if(target) {
            log(`🔮 預言家查驗結果：${target.name} 的陣營為 【${target.side}】`);
            alert(`🔮 查驗結果：${target.name} 是 【${target.side}】`);
        } else {
            log(`🔮 預言家放棄查驗。`);
        }
        goToWitchPhase();
    } 
    else if (currentSubPhase === "WITCH_PHASE") {
        // 讀取解藥/毒藥客製化輸入
        const healAction = document.getElementById("witch-heal-action").value;
        const poisonTargetId = parseInt(document.getElementById("witch-poison-select").value);
        
        if (healAction === "yes" && witchHeal) {
            nightData.saved = true;
            witchHeal = false;
            log(`🧪 女巫使用了解藥。`);
        }
        if (poisonTargetId > 0 && witchPoison) {
            nightData.poisonTarget = players.find(p => p.id === poisonTargetId);
            witchPoison = false;
            log(`🧪 女巫使用了毒藥。`);
        }
        
        evaluateNightDeaths();
    }
    else if (currentSubPhase === "MEDIATOR_PHASE") {
        const m1 = parseInt(document.getElementById("med-1").value);
        const m2 = parseInt(document.getElementById("med-2").value);
        if (m1 > 0 && m2 > 0 && m1 !== m2) {
            mediatorTargets = [players.find(p => p.id === m1), players.find(p => p.id === m2)];
            mediatorUsed = true;
            log(`⚖️ 調停生效：${mediatorTargets[0].name} 與 ${mediatorTargets[1].name} 今日投票階段不得互投。`);
        } else {
            mediatorTargets = [];
            log(`⚖️ 調停者放棄或選擇無效。`);
        }
        startDaySpeeches();
    }
}

function goToWitchPhase() {
    let witch = players.find(p => p.isAlive && p.role === "Witch");
    if (witch && (witchHeal || witchPoison)) {
        currentSubPhase = "WITCH_PHASE";
        document.getElementById("action-title").textContent = "🧪 女巫時間";
        const container = document.getElementById("action-inputs");
        container.innerHTML = "";

        // 解藥區
        if(witchHeal && nightData.killTarget) {
            container.innerHTML += `<p>👉 昨晚被殺的人是：<b>${nightData.killTarget.name}</b></p>`;
            container.innerHTML += `使用解藥？ <select id="witch-heal-action"><option value="no">否</option><option value="yes">是</option></select><br><br>`;
        } else {
            container.innerHTML += `<input type="hidden" id="witch-heal-action" value="no">`;
        }

        // 毒藥區
        if(witchPoison) {
            container.innerHTML += `使用毒藥對象？ <select id="witch-poison-select"><option value="0">不投毒</option></select>`;
            let pSelect = document.getElementById("witch-poison-select");
            players.forEach(p => {
                if(p.isAlive) {
                    let opt = document.createElement("option");
                    opt.value = p.id;
                    opt.textContent = p.name;
                    pSelect.appendChild(opt);
                }
            });
        } else {
            container.innerHTML += `<input type="hidden" id="witch-poison-select" value="0">`;
        }
    } else {
        evaluateNightDeaths();
    }
}

// 結算夜晚死亡
function evaluateNightDeaths() {
    let deaths = [];
    
    // 叛徒轉化邏輯
    let traitor = players.find(p => p.isAlive && p.role === "Traitor");
    if (traitor && traitor === nightData.killTarget && nightData.saved) {
        traitor.side = "狼人";
        log(`🌙 [秘密機制] 叛徒被救起，黑暗覺醒，轉化為【狼人】陣營！`);
    }

    if (!nightData.saved && nightData.killTarget) {
        nightData.killTarget.isAlive = false;
        deaths.push(nightData.killTarget);
    }
    if (nightData.poisonTarget) {
        nightData.poisonTarget.isAlive = false;
        if(!deaths.includes(nightData.poisonTarget)) deaths.push(nightData.poisonTarget);
    }

    renderPlayers();
    
    // 進入白天
    document.getElementById("game-info").textContent = `☀️ 第 ${dayCount} 天 亮了`;
    log(`<br><b>☀️ 第 ${dayCount} 天 太陽升起 ---</b>`);
    
    if(deaths.length === 0) {
        log("🕊️ 昨晚是個平安夜，沒有人死亡。");
    } else {
        deaths.forEach(d => {
            log(`💀 昨晚死亡：${d.name}`);
            if (dayCount % 2 !== 0) {
                let speech = prompt(`🎤 請 ${d.name} 發表遺言：`, "我很清白...");
                log(`>>> ${d.name} 的遺言：『${speech || '無'}』`);
            } else {
                log(`🤫 雙數天：${d.name} 無遺言。`);
            }
        });
    }

    if(checkVictory()) return;

    // 檢查調停者技能
    let mediator = players.find(p => p.isAlive && p.role === "Mediator");
    if(mediator && !mediatorUsed) {
        currentSubPhase = "MEDIATOR_PHASE";
        document.getElementById("action-title").textContent = `⚖️ 調停者 (${mediator.name}) 技能發動`;
        const container = document.getElementById("action-inputs");
        container.innerHTML = `<p>選擇今日被禁止相互投票的兩位玩家：</p>
            玩家A: <select id="med-1"><option value="0">不發動</option></select>
            玩家B: <select id="med-2"><option value="0">不發動</option></select>`;
        
        let s1 = document.getElementById("med-1");
        let s2 = document.getElementById("med-2");
        players.forEach(p => {
            if(p.isAlive) {
                s1.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                s2.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            }
        });
    } else {
        mediatorTargets = []; // 清空前一天的禁票
        startDaySpeeches();
    }
}

// --- 白天發言與投票邏輯 ---
function startDaySpeeches() {
    log(`<br>📢 <b>進入玩家輪流發言階段：</b>`);
    // 單數正序，雙數倒序
    let order = [...players];
    if (dayCount % 2 === 0) order.reverse();

    order.forEach(p => {
        if(p.isAlive) {
            let sp = prompt(`🎤 [輪流發言] 請 ${p.name} 輸入發言：`, "大家聽我說，我是好人...");
            log(`>>> ${p.name} 說：『${sp || '過'}』`);
        }
    });

    // 自由補充發言階段
    log(`<br>❓ <b>自由補充發言階段（模擬自由插嘴）：</b>`);
    while(true) {
        let more = prompt("欲補充發言請輸入玩家編號 (1-10)，若無人要補充請輸入 0 進入公投：", "0");
        if(more === "0" || !more) break;
        let idx = parseInt(more) - 1;
        if(idx >= 0 && idx < 10 && players[idx].isAlive) {
            let sp = prompt(`🎤 [補充發言] 請 ${players[idx].name} 輸入補充內容：`);
            log(`>>> ${players[idx].name} 補充：『${sp || '無'}』`);
        } else {
            alert("無效編號或該玩家已死亡。");
        }
    }

    startVotingPhase();
}

function startVotingPhase() {
    log(`<br>🗳️ <b>進入全民公投投票階段！</b>`);
    voteBox = {};
    
    // 依序要求活著的人投票
    let aliveVoters = players.filter(p => p.isAlive);
    
    for(let voter of aliveVoters) {
        while(true) {
            let voteVal = prompt(`請 ${voter.name} 投票 (輸入1-10投給該玩家，輸入0棄權)：`, "0");
            let targetId = parseInt(voteVal);
            
            if(voteVal === "0" || isNaN(targetId)) {
                log(`🗳️ ${voter.name} 選擇棄權。`);
                break; 
            }
            
            let target = players.find(p => p.id === targetId);
            if(target && target.isAlive) {
                // 調停者互投檢查
                if(mediatorTargets.length === 2) {
                    if((voter.id === mediatorTargets[0].id && target.id === mediatorTargets[1].id) ||
                       (voter.id === mediatorTargets[1].id && target.id === mediatorTargets[0].id)) {
                        alert(`⛔ 調停者技能生效中！禁止 ${mediatorTargets[0].name} 與 ${mediatorTargets[1].name} 互相傷害！請重新投票。`);
                        continue;
                    }
                }
                
                voteBox[targetId] = (voteBox[targetId] || 0) + 1;
                log(`🗳️ ${voter.name} 👉 投給了 ${target.name}`);
                break;
            } else {
                alert("目標無效或已死亡，請重新輸入！");
            }
        }
    }

    // 計算票數
    let keys = Object.keys(voteBox);
    if(keys.length === 0) {
        log("🕊️ 全員棄權，今日無人出局。");
    } else {
        let maxVotes = 0;
        let candidates = [];
        
        for(let id in voteBox) {
            if(voteBox[id] > maxVotes) {
                maxVotes = voteBox[id];
                candidates = [id];
            } else if (voteBox[id] === maxVotes) {
                candidates.push(id);
            }
        }

        if(candidates.length > 1) {
            log(`⚖️ 出現最高平票（玩家編號: ${candidates.join(", ")}），今日公投無人出局。`);
        } else {
            let exiledId = parseInt(candidates[0]);
            let exiled = players.find(p => p.id === exiledId);
            exiled.isAlive = false;
            log(`🚪 <b>${exiled.name} 以最高 ${maxVotes} 票被公投流放出局！</b>`);
            
            if (dayCount % 2 !== 0) {
                let speech = prompt(`🎤 請 ${exiled.name} 發表流放遺言：`, "你們投錯人了...");
                log(`>>> ${exiled.name} 的遺言：『${speech || '無'}』`);
            } else {
                log(`🤫 雙數天：${exiled.name} 無遺言。`);
            }
        }
    }

    renderPlayers();
    if(checkVictory()) return;

    // 準備進入下一晚
    dayCount++;
    currentSubPhase = "NEXT_NIGHT_WAIT";
    document.getElementById("action-title").textContent = "白天結束";
    document.getElementById("action-inputs").innerHTML = `<p>請點擊下方按鈕推進到夜晚。</p>`;
    document.getElementById("btn-submit-action").textContent = "⏩ 進入下一晚";
}

// 接續處理或重啟夜晚
function nextNightStep() {
    document.getElementById("btn-submit-action").textContent = "確認送出";
    startNight();
}

// 複寫 processAction 以應對等待下一晚
const originalProcessAction = processAction;
processAction = function() {
    if(currentSubPhase === "NEXT_NIGHT_WAIT") {
        nextNightStep();
    } else {
        originalProcessAction();
    }
}

// 執行
initGame();
</script>
